name: 构建 Flutter 安装包

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.0，必须大于最新版本)'
        type: string
        required: true
      build_android:
        description: '构建 Android APK'
        type: boolean
        default: true
      build_windows:
        description: '构建 Windows'
        type: boolean
        default: true
      build_linux_x64:
        description: '构建 Linux x64'
        type: boolean
        default: true
      build_linux_arm64:
        description: '构建 Linux ARM64'
        type: boolean
        default: true
      build_macos_x64:
        description: '构建 macOS x64'
        type: boolean
        default: true
      build_macos_arm64:
        description: '构建 macOS ARM64'
        type: boolean
        default: true

env:
  # 应用名称，用于生成安装包文件名
  APP_NAME: CFnat
  # Rust 库名称，对应 flutter/rust/Cargo.toml 中的 package.name
  RUST_LIB_NAME: cfnat_flutter
  # Android 签名密钥别名默认值，当 ANDROID_KEY_ALIAS Secret 未设置时使用
  ANDROID_KEY_ALIAS_DEFAULT: cfnat

jobs:
  validate_version:
    name: 验证版本号
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: 验证版本号
        id: validate
        run: |
          git fetch --tags --force
          latest=$(git tag --sort=-version:refname 2>/dev/null | head -n 1 || echo "0.0.0")
          latest=${latest#v}
          input_version="${{ github.event.inputs.version }}"
          input_version=${input_version#v}
          echo "最新Tag: $latest"
          echo "输入版本: $input_version"

          latest_arr=(${latest//./ })
          input_arr=(${input_version//./ })

          valid=true
          for i in 0 1 2; do
            l=${latest_arr[$i]:-0}
            n=${input_arr[$i]:-0}
            if [[ $n -gt $l ]]; then
              valid=true
              break
            elif [[ $n -lt $l ]]; then
              valid=false
              break
            fi
          done

          if [[ "$valid" == "false" ]]; then
            echo "错误: 输入版本 $input_version 必须大于最新版本 $latest"
            exit 1
          fi

          echo "版本验证通过"
          version="${{ github.event.inputs.version }}"
          if [[ ! "$version" == v* ]]; then
            version="v$version"
          fi
          echo "version=$version" >> $GITHUB_OUTPUT

  build_android:
    name: 构建 Android APK
    needs: [validate_version]
    if: ${{ inputs.build_android }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: 安装 LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm clang libclang-dev

      - name: 安装 cargo-ndk 和 flutter_rust_bridge
        run: |
          cargo install cargo-ndk
          cargo install flutter_rust_bridge_codegen

      - name: 配置 Flutter 平台
        run: |
          cd flutter
          flutter config --enable-android

      - name: 生成桥接代码
        run: |
          cd flutter
          flutter pub get
          flutter_rust_bridge_codegen generate

      - name: 编译 Rust 库 (Android)
        run: |
          cd flutter/rust
          cargo ndk -t arm64-v8a -t armeabi-v7a -t x86_64 -t x86 -o ../android/app/src/main/jniLibs build --release

      - name: 构建 Android APK
        run: |
          cd flutter
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > android/keystore.jks
          VERSION="${{ needs.validate_version.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          flutter build apk --release --split-per-abi --build-name="$VERSION_NUM" \
            -Pandroid.injected.signing.store.file=$(pwd)/android/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: 重命名产物
        run: |
          cd flutter/build/app/outputs/flutter-apk
          for apk in app-*-release.apk; do
            arch=$(echo "$apk" | sed 's/app-\(.*\)-release.apk/\1/')
            mv "$apk" ${{ env.APP_NAME }}-android-${arch}.apk
          done

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: flutter/build/app/outputs/flutter-apk/*.apk

  build_windows:
    name: 构建 Windows
    needs: [validate_version]
    if: ${{ inputs.build_windows }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: 安装 Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: 安装 LLVM
        run: choco install llvm -y

      - name: 安装 cargo-zigbuild 和 flutter_rust_bridge
        run: |
          cargo install --locked cargo-zigbuild
          cargo install flutter_rust_bridge_codegen

      - name: 清理旧生成文件
        run: |
          Remove-Item -Path "flutter\rust\src\frb_generated*.rs" -Force -ErrorAction SilentlyContinue
          cd flutter; flutter clean

      - name: 配置 Flutter 平台
        run: |
          cd flutter
          flutter config --enable-windows-desktop

      - name: 生成桥接代码
        run: |
          cd flutter
          flutter pub get
          flutter_rust_bridge_codegen generate

      - name: 编译 Rust 库 (Windows)
        run: |
          cd flutter/rust
          cargo zigbuild --release --target x86_64-pc-windows-msvc || cargo build --release --target x86_64-pc-windows-msvc

      - name: 构建 Windows
        run: |
          cd flutter
          $VERSION = "${{ needs.validate_version.outputs.version }}"
          $VERSION_NUM = $VERSION -replace '^v', ''
          flutter build windows --release --build-name="$VERSION_NUM"

      - name: 复制 DLL 到输出目录
        run: cp flutter/rust/target/x86_64-pc-windows-msvc/release/${{ env.RUST_LIB_NAME }}.dll flutter/build/windows/x64/runner/Release/

      - name: 打包 Portable 版本
        run: Compress-Archive -Path "flutter/build/windows/x64/runner/Release/*" -DestinationPath "${{ env.APP_NAME }}-windows-x64.zip"

      - name: 创建 Setup 安装脚本
        run: |
          $version = "${{ needs.validate_version.outputs.version }}"
          $versionStr = $version -replace 'v', ''
          $content = @"
          [Setup]
          AppName=${{ env.APP_NAME }}
          AppVersion=$versionStr
          DefaultDirName={autopf}\${{ env.APP_NAME }}
          OutputDir=.
          OutputBaseFilename=${{ env.APP_NAME }}-windows-x64-setup
          Compression=lzma2

          [Files]
          Source: "flutter\build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs

          [Icons]
          Name: "{group}\${{ env.APP_NAME }}"; Filename: "{app}\${{ env.APP_NAME }}.exe"
          Name: "{commondesktop}\${{ env.APP_NAME }}"; Filename: "{app}\${{ env.APP_NAME }}.exe"

          [Run]
          Filename: "{app}\${{ env.APP_NAME }}.exe"; Description: "{cm:LaunchProgram,${{ env.APP_NAME }}}"; Flags: nowait postinstall skipifsilent
          "@
          $content | Out-File -FilePath setup.iss -Encoding UTF8 -NoNewline

      - name: 编译 Inno Setup 安装包
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.7
        with:
          path: setup.iss

      - name: 上传 Windows 产物
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            *.zip
            *.exe

  build_linux:
    name: 构建 Linux ${{ matrix.arch }}
    needs: [validate_version]
    if: ${{ inputs.build_linux_x64 || inputs.build_linux_arm64 }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            use_zig: true
            appimage_arch: x86_64
            flutter_bundle_dir: x64/release/bundle
          - arch: arm64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            use_zig: false
            appimage_arch: aarch64
            flutter_bundle_dir: arm64/release/bundle
    steps:
      - uses: actions/checkout@v4

      - name: 检查是否需要构建
        id: check_enabled
        run: |
          if [ "${{ matrix.arch }}" == "x64" ] && [ "${{ inputs.build_linux_x64 }}" != "true" ]; then
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "跳过 Linux x64 构建"
          elif [ "${{ matrix.arch }}" == "arm64" ] && [ "${{ inputs.build_linux_arm64 }}" != "true" ]; then
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "跳过 Linux arm64 构建"
          else
            echo "enabled=true" >> $GITHUB_OUTPUT
          fi

      - name: 安装 Flutter (x64)
        if: steps.check_enabled.outputs.enabled == 'true' && matrix.arch == 'x64'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: 安装 Flutter (ARM64)
        if: steps.check_enabled.outputs.enabled == 'true' && matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip git
          FLUTTER_DIR="$HOME/flutter"
          if [ ! -d "$FLUTTER_DIR" ]; then
            git clone https://github.com/flutter/flutter.git -b stable --depth 1 "$FLUTTER_DIR"
          fi
          echo "$FLUTTER_DIR/bin" >> $GITHUB_PATH
          "$FLUTTER_DIR/bin/flutter" --version
          "$FLUTTER_DIR/bin/flutter" precache --linux

      - name: 安装 Rust
        if: steps.check_enabled.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: 安装 Zig (x64)
        if: steps.check_enabled.outputs.enabled == 'true' && matrix.use_zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: 安装系统依赖
        if: steps.check_enabled.outputs.enabled == 'true'
        run: |
          sudo apt-get update
          if [ "${{ matrix.arch }}" == "x64" ]; then
            sudo apt-get install -y llvm clang libclang-dev ninja-build cmake libgtk-3-dev pkg-config libfuse2 ruby ruby-dev
          else
            sudo apt-get install -y clang pkg-config ninja-build cmake libgtk-3-dev libfuse2 ruby ruby-dev libclang-dev libx11-dev libgl1-mesa-dev
          fi
          sudo gem install fpm

      - name: 安装 Rust 工具 (x64)
        if: steps.check_enabled.outputs.enabled == 'true' && matrix.use_zig
        run: |
          cargo install --locked cargo-zigbuild
          cargo install flutter_rust_bridge_codegen

      - name: 安装 Rust 工具 (ARM64)
        if: steps.check_enabled.outputs.enabled == 'true' && '!matrix.use_zig'
        run: cargo install flutter_rust_bridge_codegen

      - name: 清理旧生成文件
        if: steps.check_enabled.outputs.enabled == 'true'
        run: |
          rm -rf flutter/rust/src/frb_generated*.rs || true
          cd flutter && flutter clean || true

      - name: 配置 Flutter 平台
        if: steps.check_enabled.outputs.enabled == 'true'
        run: |
          cd flutter
          flutter config --enable-linux-desktop

      - name: 生成桥接代码
        if: steps.check_enabled.outputs.enabled == 'true'
        run: |
          cd flutter
          flutter pub get
          flutter_rust_bridge_codegen generate

      - name: 编译 Rust 库 (x64)
        if: steps.check_enabled.outputs.enabled == 'true' && matrix.use_zig
        run: |
          cd flutter/rust
          cargo zigbuild --release --target ${{ matrix.rust_target }} || cargo build --release --target ${{ matrix.rust_target }}

      - name: 编译 Rust 库 (ARM64)
        if: steps.check_enabled.outputs.enabled == 'true' && '!matrix.use_zig'
        run: |
          cd flutter/rust
          cargo build --release

      - name: 构建 Linux
        if: steps.check_enabled.outputs.enabled == 'true'
        run: |
          cd flutter
          VERSION="${{ needs.validate_version.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          flutter build linux --release --build-name="$VERSION_NUM"

      - name: 复制 so 到输出目录
        if: steps.check_enabled.outputs.enabled == 'true'
        run: |
          if [ "${{ matrix.arch }}" == "x64" ]; then
            BUNDLE_DIR="flutter/build/linux/${{ matrix.flutter_bundle_dir }}"
            mkdir -p "$BUNDLE_DIR/lib"
            cp flutter/rust/target/${{ matrix.rust_target }}/release/lib${{ env.RUST_LIB_NAME }}.so "$BUNDLE_DIR/lib/"
          else
            BUNDLE_DIR=$(find flutter/build/linux -type d -name "bundle" | head -1)
            if [ -z "$BUNDLE_DIR" ]; then
              echo "错误：未找到 Flutter bundle 目录"
              exit 1
            fi
            echo "使用 bundle 目录: $BUNDLE_DIR"
            mkdir -p "$BUNDLE_DIR/lib"
            cp flutter/rust/target/release/lib${{ env.RUST_LIB_NAME }}.so "$BUNDLE_DIR/lib/"
          fi

      - name: 打包发布文件
        if: steps.check_enabled.outputs.enabled == 'true'
        run: |
          version="${{ needs.validate_version.outputs.version }}"
          versionStr="${version#v}"
          mkdir -p ${{ github.workspace }}/output
          
          if [ "${{ matrix.arch }}" == "x64" ]; then
            BUNDLE_DIR="${{ github.workspace }}/flutter/build/linux/${{ matrix.flutter_bundle_dir }}"
          else
            BUNDLE_DIR=$(find ${{ github.workspace }}/flutter/build/linux -type d -name "bundle" | head -1)
            if [ -z "$BUNDLE_DIR" ]; then
              echo "错误：未找到 Flutter bundle 目录"
              exit 1
            fi
            echo "BUNDLE_DIR: $BUNDLE_DIR"
          fi
          
          TEMP_DIR="${{ github.workspace }}/temp_tar_dir"
          
          rm -rf "$TEMP_DIR"
          mkdir -p "$TEMP_DIR"
          cp -r "$BUNDLE_DIR/." "$TEMP_DIR/"
          
          tar -czf "${{ github.workspace }}/output/${{ env.APP_NAME }}-linux-${{ matrix.arch }}.tar.gz" -C "$TEMP_DIR" .
          rm -rf "$TEMP_DIR"
          
          cd "$BUNDLE_DIR"
          
          rm -rf deb_root
          mkdir -p deb_root/usr/local/lib/${{ env.APP_NAME }}
          mkdir -p deb_root/usr/local/bin
          find . -maxdepth 1 -mindepth 1 ! -name deb_root -exec cp -r {} deb_root/usr/local/lib/${{ env.APP_NAME }}/ \;
          ln -sf /usr/local/lib/${{ env.APP_NAME }}/${{ env.APP_NAME }} deb_root/usr/local/bin/${{ env.APP_NAME }} || true
          fpm -s dir -t deb -n ${{ env.APP_NAME }} -v ${versionStr} -p ${{ github.workspace }}/output/${{ env.APP_NAME }}-linux-${{ matrix.arch }}.deb -C deb_root usr
          
          rm -rf deb_root
          mkdir -p deb_root/usr/local/lib/${{ env.APP_NAME }}
          mkdir -p deb_root/usr/local/bin
          find . -maxdepth 1 -mindepth 1 ! -name deb_root -exec cp -r {} deb_root/usr/local/lib/${{ env.APP_NAME }}/ \;
          ln -sf /usr/local/lib/${{ env.APP_NAME }}/${{ env.APP_NAME }} deb_root/usr/local/bin/${{ env.APP_NAME }} || true
          fpm -s dir -t rpm -n ${{ env.APP_NAME }} -v ${versionStr} -p ${{ github.workspace }}/output/${{ env.APP_NAME }}-linux-${{ matrix.arch }}.rpm -C deb_root usr

      - name: 下载 AppImageTool
        if: steps.check_enabled.outputs.enabled == 'true'
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-${{ matrix.appimage_arch }}.AppImage -O appimagetool
          chmod +x appimagetool

      - name: 创建 AppImage
        if: steps.check_enabled.outputs.enabled == 'true'
        run: |
          if [ "${{ matrix.arch }}" == "x64" ]; then
            BUNDLE_DIR="${{ github.workspace }}/flutter/build/linux/${{ matrix.flutter_bundle_dir }}"
          else
            BUNDLE_DIR=$(find flutter/build/linux -type d -name "bundle" | head -1)
            if [ -z "$BUNDLE_DIR" ]; then
              echo "错误：未找到 Flutter bundle 目录"
              exit 1
            fi
          fi
          
          mkdir -p AppDir/usr/lib/${{ env.APP_NAME }}
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          
          cp -r "$BUNDLE_DIR"/* AppDir/usr/lib/${{ env.APP_NAME }}/
          
          ln -sf ../lib/${{ env.APP_NAME }}/${{ env.APP_NAME }} AppDir/usr/bin/${{ env.APP_NAME }} || true
          
          cat > AppDir/${{ env.APP_NAME }}.desktop << EOF
          [Desktop Entry]
          Name=${{ env.APP_NAME }}
          Exec=${{ env.APP_NAME }}
          Icon=${{ env.APP_NAME }}
          Type=Application
          Categories=Network;
          EOF
          
          cp AppDir/${{ env.APP_NAME }}.desktop AppDir/usr/share/applications/
          
          if [ -f "flutter/linux/flutter/ephemeral/assets/icon.png" ]; then
            cp flutter/linux/flutter/ephemeral/assets/icon.png AppDir/${{ env.APP_NAME }}.png
          else
            convert -size 256x256 xc:blue AppDir/${{ env.APP_NAME }}.png 2>/dev/null || echo "placeholder" > AppDir/${{ env.APP_NAME }}.png
          fi
          
          ARCH=${{ matrix.appimage_arch }} ./appimagetool AppDir ${{ github.workspace }}/output/${{ env.APP_NAME }}-linux-${{ matrix.arch }}.AppImage

      - name: 上传 Linux 产物
        if: steps.check_enabled.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: output/*

  build_macos:
    name: 构建 macOS ${{ matrix.arch }}
    needs: [validate_version]
    if: ${{ inputs.build_macos_x64 || inputs.build_macos_arm64 }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            rust_target: x86_64-apple-darwin
          - arch: arm64
            rust_target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: 检查是否需要构建
        id: check_enabled
        run: |
          if [ "${{ matrix.arch }}" == "x64" ] && [ "${{ inputs.build_macos_x64 }}" != "true" ]; then
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "跳过 macOS x64 构建"
          elif [ "${{ matrix.arch }}" == "arm64" ] && [ "${{ inputs.build_macos_arm64 }}" != "true" ]; then
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "跳过 macOS arm64 构建"
          else
            echo "enabled=true" >> $GITHUB_OUTPUT
          fi

      - name: 安装 Flutter
        if: steps.check_enabled.outputs.enabled == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: 安装 Rust
        if: steps.check_enabled.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: 安装 Zig
        if: steps.check_enabled.outputs.enabled == 'true'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: 安装 LLVM
        if: steps.check_enabled.outputs.enabled == 'true'
        run: brew install llvm

      - name: 安装 cargo-zigbuild 和 flutter_rust_bridge
        if: steps.check_enabled.outputs.enabled == 'true'
        run: |
          cargo install --locked cargo-zigbuild
          cargo install flutter_rust_bridge_codegen

      - name: 清理旧生成文件
        if: steps.check_enabled.outputs.enabled == 'true' && matrix.arch == 'x64'
        run: |
          rm -rf flutter/rust/src/frb_generated*.rs || true
          cd flutter && flutter clean || true

      - name: 配置 Flutter 平台
        if: steps.check_enabled.outputs.enabled == 'true'
        run: |
          cd flutter
          flutter config --enable-macos-desktop

      - name: 生成桥接代码
        if: steps.check_enabled.outputs.enabled == 'true'
        run: |
          cd flutter
          flutter pub get
          flutter_rust_bridge_codegen generate

      - name: 编译 Rust 库 (macOS)
        if: steps.check_enabled.outputs.enabled == 'true'
        run: |
          cd flutter/rust
          cargo zigbuild --release --target ${{ matrix.rust_target }} || cargo build --release --target ${{ matrix.rust_target }}

      - name: 构建 macOS
        if: steps.check_enabled.outputs.enabled == 'true'
        run: |
          cd flutter
          VERSION="${{ needs.validate_version.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          if [ "${{ matrix.arch }}" == "arm64" ]; then
            export FLUTTER_XCODE_ARCHS=arm64
          fi
          flutter build macos --release --build-name="$VERSION_NUM"

      - name: 复制 dylib 到 app
        if: steps.check_enabled.outputs.enabled == 'true'
        run: |
          APP_PATH=$(find flutter/build/macos/Build/Products/Release -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "错误：未找到 .app 文件"
            exit 1
          fi
          echo "找到 app: $APP_PATH"
          cp flutter/rust/target/${{ matrix.rust_target }}/release/lib${{ env.RUST_LIB_NAME }}.dylib "$APP_PATH/Contents/MacOS/"

      - name: 打包 DMG
        if: steps.check_enabled.outputs.enabled == 'true'
        run: |
          cd flutter/build/macos
          APP_PATH=$(find Build/Products/Release -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "错误：未找到 .app 文件"
            ls -la Build/Products/Release
            exit 1
          fi
          
          rm -f "${{ env.APP_NAME }}-macos-${{ matrix.arch }}.dmg"
          
          hdiutil create -volname "${{ env.APP_NAME }}" \
                         -srcfolder "$APP_PATH" \
                         -ov -format UDZO \
                         "${{ env.APP_NAME }}-macos-${{ matrix.arch }}.dmg"

      - name: 上传 macOS 产物
        if: steps.check_enabled.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: flutter/build/macos/*.dmg

  create_release:
    name: 创建 Release
    needs: [build_android, build_windows, build_linux, build_macos, validate_version]
    if: ${{ success() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: '*'
          merge-multiple: true

      - name: 生成 Release Notes
        run: |
          VERSION="${{ needs.validate_version.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          REPO="${{ github.repository }}"
          APPNAME="${{ env.APP_NAME }}"
          
          sed -e "s/USER/$(echo $REPO | cut -d'/' -f1)/g" \
              -e "s/REPO/$(echo $REPO | cut -d'/' -f2)/g" \
              -e "s/vVERSION/$VERSION/g" \
              -e "s/VERSION/$VERSION_NUM/g" \
              -e "s/APPNAME/$APPNAME/g" \
              .github/release-notes-template.md > release-notes.md

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "${{ env.APP_NAME }} ${{ needs.validate_version.outputs.version }}"
          tag_name: ${{ needs.validate_version.outputs.version }}
          body_path: release-notes.md
          draft: false
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
