name: 构建 Flutter 安装包

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.0，必须大于最新版本)'
        type: string
        required: true
      build_android:
        description: '构建 Android APK'
        type: boolean
        default: false
      build_windows:
        description: '构建 Windows'
        type: boolean
        default: false
      build_linux_x64:
        description: '构建 Linux x64'
        type: boolean
        default: false
      build_linux_arm64:
        description: '构建 Linux ARM64'
        type: boolean
        default: false
      build_macos_x64:
        description: '构建 macOS x64'
        type: boolean
        default: false
      build_macos_arm64:
        description: '构建 macOS ARM64'
        type: boolean
        default: false

env:
  APP_NAME: CFnat

jobs:
  validate_version:
    name: 验证版本号
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: 验证版本号
        id: validate
        run: |
          git fetch --tags
          latest=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          latest=${latest#v}
          input_version="${{ github.event.inputs.version }}"
          input_version=${input_version#v}
          echo "最新Tag: $latest"
          echo "输入版本: $input_version"

          latest_arr=(${latest//./ })
          input_arr=(${input_version//./ })

          valid=true
          for i in 0 1 2; do
            l=${latest_arr[$i]:-0}
            n=${input_arr[$i]:-0}
            if [[ $n -gt $l ]]; then
              valid=true
              break
            elif [[ $n -lt $l ]]; then
              valid=false
              break
            fi
          done

          if [[ "$valid" == "false" ]]; then
            echo "错误: 输入版本 $input_version 必须大于最新版本 $latest"
            exit 1
          fi

          echo "版本验证通过"
          version="${{ github.event.inputs.version }}"
          if [[ ! "$version" == v* ]]; then
            version="v$version"
          fi
          echo "version=$version" >> $GITHUB_OUTPUT

  build_android:
    name: 构建 Android APK
    needs: [validate_version]
    if: ${{ inputs.build_android }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: 安装 LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm clang libclang-dev

      - name: 安装 cargo-ndk 和 flutter_rust_bridge
        run: |
          cargo install cargo-ndk
          cargo install flutter_rust_bridge_codegen

      - name: 配置 Flutter 平台
        run: |
          cd flutter
          flutter config --enable-android

      - name: 生成桥接代码
        run: |
          cd flutter
          flutter pub get
          flutter_rust_bridge_codegen generate

      - name: 编译 Rust 库 (Android)
        run: |
          cd flutter/rust
          cargo ndk -t arm64-v8a -t armeabi-v7a -t x86_64 -t x86 -o ../android/app/src/main/jniLibs build --release

      - name: 构建 Android APK
        run: |
          cd flutter
          VERSION="${{ needs.validate_version.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          flutter build apk --release --split-per-abi --build-name="$VERSION_NUM"

      - name: 重命名产物
        run: |
          cd flutter/build/app/outputs/flutter-apk
          for apk in app-*-release.apk; do
            arch=$(echo "$apk" | sed 's/app-\(.*\)-release.apk/\1/')
            cp "$apk" ${{ env.APP_NAME }}-android-${arch}.apk
          done

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: flutter/build/app/outputs/flutter-apk/*.apk

  build_windows:
    name: 构建 Windows
    needs: [validate_version]
    if: ${{ inputs.build_windows }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: 安装 Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: 安装 LLVM
        run: |
          choco install llvm -y

      - name: 安装 cargo-zigbuild 和 flutter_rust_bridge
        run: |
          cargo install --locked cargo-zigbuild
          cargo install flutter_rust_bridge_codegen

      - name: 配置 Flutter 平台
        run: |
          cd flutter
          flutter config --enable-windows-desktop

      - name: 生成桥接代码
        run: |
          cd flutter
          flutter pub get
          flutter_rust_bridge_codegen generate

      - name: 编译 Rust 库 (Windows)
        run: |
          cd flutter/rust
          cargo zigbuild --release --target x86_64-pc-windows-msvc

      - name: 构建 Windows
        run: |
          cd flutter
          VERSION="${{ needs.validate_version.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          flutter build windows --release --build-name="$VERSION_NUM"

      - name: 复制 DLL 到输出目录
        run: |
          cp flutter/rust/target/x86_64-pc-windows-msvc/release/cfnat_flutter.dll flutter/build/windows/runner/Release/

      - name: 打包 Portable 版本
        run: |
          Compress-Archive -Path "flutter/build/windows/runner/Release/*" -DestinationPath "${{ env.APP_NAME }}-windows-x64.zip"

      - name: 安装 Inno Setup
        run: |
          Invoke-WebRequest -Uri "https://files.jrsoftware.org/is/6/innosetup-6.2.2.exe" -OutFile is.exe
          Start-Process -Wait -FilePath "./is.exe" -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/SP-"
          Move-Item -Path "$env:ProgramFiles/Inno Setup 6/ISCC.exe" -Destination ./
          Remove-Item is.exe -Force

      - name: 创建 Setup 安装脚本
        run: |
          $version = "${{ needs.validate_version.outputs.version }}"
          $versionStr = $version -replace 'v', ''
          @"
          [Setup]
          AppName=${{ env.APP_NAME }}
          AppVersion=$versionStr
          DefaultDirName={autopf}\${{ env.APP_NAME }}
          OutputDir=.
          OutputBaseFilename=${{ env.APP_NAME }}-windows-x64-setup
          Compression=lzma2
          [Files]
          Source="flutter\build\windows\runner\Release\*"; DestDir="{app}"; Flags: ignoreversion recursesubdirs
          "@ | Out-File -FilePath setup.iss -Encoding UTF8

      - name: 编译 Setup 安装包
        run: |
          .\ISCC.exe setup.iss

      - name: 上传 Windows 产物
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            *.zip
            *.exe

  build_linux_x64:
    name: 构建 Linux x64
    needs: [validate_version]
    if: ${{ inputs.build_linux_x64 }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: 安装 Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools llvm clang libclang-dev ninja-build cmake libgtk-3-dev pkg-config libfuse2 ruby ruby-dev
          sudo gem install fpm

      - name: 安装 cargo-zigbuild 和 flutter_rust_bridge
        run: |
          cargo install --locked cargo-zigbuild
          cargo install flutter_rust_bridge_codegen

      - name: 配置 Flutter 平台
        run: |
          cd flutter
          flutter config --enable-linux-desktop

      - name: 生成桥接代码
        run: |
          cd flutter
          flutter pub get
          flutter_rust_bridge_codegen generate

      - name: 编译 Rust 库 (Linux x64)
        run: |
          cd flutter/rust
          cargo zigbuild --release --target x86_64-unknown-linux-musl

      - name: 构建 Linux
        run: |
          cd flutter
          VERSION="${{ needs.validate_version.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          flutter build linux --release --build-name="$VERSION_NUM"

      - name: 复制 so 到输出目录
        run: |
          cp flutter/rust/target/x86_64-unknown-linux-musl/release/libcfnat_flutter.so flutter/build/linux/x64/release/bundle/lib/

      - name: 打包发布文件
        run: |
          version=${{ needs.validate_version.outputs.version }}
          versionStr=${version#v}
          mkdir -p ${{ github.workspace }}/linux
          
          cd flutter/build/linux/x64/release/bundle
          
          tar -czf "${{ env.APP_NAME }}-linux-x64.tar.gz" ./*
          mv *.tar.gz ${{ github.workspace }}/linux/
          
          mkdir -p deb_root/usr/local/lib/${{ env.APP_NAME }}
          mkdir -p deb_root/usr/local/bin
          cp -r ./* deb_root/usr/local/lib/${{ env.APP_NAME }}/
          ln -s /usr/local/lib/${{ env.APP_NAME }}/${{ env.APP_NAME }} deb_root/usr/local/bin/${{ env.APP_NAME }} || true
          fpm -s dir -t deb -n ${{ env.APP_NAME }} -v ${versionStr} -p ${{ github.workspace }}/linux/${{ env.APP_NAME }}-linux-x64.deb -C deb_root usr
          
          rm -rf deb_root
          mkdir -p deb_root/usr/local/lib/${{ env.APP_NAME }}
          mkdir -p deb_root/usr/local/bin
          cp -r ./* deb_root/usr/local/lib/${{ env.APP_NAME }}/
          ln -s /usr/local/lib/${{ env.APP_NAME }}/${{ env.APP_NAME }} deb_root/usr/local/bin/${{ env.APP_NAME }} || true
          fpm -s dir -t rpm -n ${{ env.APP_NAME }} -v ${versionStr} -p ${{ github.workspace }}/linux/${{ env.APP_NAME }}-linux-x64.rpm -C deb_root usr

      - name: 下载 AppImageTool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

      - name: 创建 AppImage
        run: |
          mkdir -p AppDir/usr/lib/${{ env.APP_NAME }}
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          
          cp -r flutter/build/linux/x64/release/bundle/* AppDir/usr/lib/${{ env.APP_NAME }}/
          
          ln -s ../lib/${{ env.APP_NAME }}/${{ env.APP_NAME }} AppDir/usr/bin/${{ env.APP_NAME }} || true
          
          echo "[Desktop Entry]" > AppDir/${{ env.APP_NAME }}.desktop
          echo "Name=${{ env.APP_NAME }}" >> AppDir/${{ env.APP_NAME }}.desktop
          echo "Exec=${{ env.APP_NAME }}" >> AppDir/${{ env.APP_NAME }}.desktop
          echo "Icon=${{ env.APP_NAME }}" >> AppDir/${{ env.APP_NAME }}.desktop
          echo "Type=Application" >> AppDir/${{ env.APP_NAME }}.desktop
          echo "Categories=Network;" >> AppDir/${{ env.APP_NAME }}.desktop
          
          cp AppDir/${{ env.APP_NAME }}.desktop AppDir/usr/share/applications/
          
          if [ -f "flutter/linux/flutter/ephemeral/assets/icon.png" ]; then
            cp flutter/linux/flutter/ephemeral/assets/icon.png AppDir/${{ env.APP_NAME }}.png
          else
            convert -size 256x256 xc:blue AppDir/${{ env.APP_NAME }}.png 2>/dev/null || echo "placeholder" > AppDir/${{ env.APP_NAME }}.png
          fi
          
          ARCH=x86_64 ./appimagetool AppDir ${{ github.workspace }}/linux/${{ env.APP_NAME }}-linux-x64.AppImage

      - name: 上传 Linux 产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: linux/*

  build_linux_arm64:
    name: 构建 Linux arm64
    needs: [validate_version]
    if: ${{ inputs.build_linux_arm64 }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: 安装 Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools llvm clang libclang-dev ninja-build cmake libgtk-3-dev pkg-config libfuse2 gcc-aarch64-linux-gnu g++-aarch64-linux-gnu ruby ruby-dev
          sudo gem install fpm

      - name: 安装 cargo-zigbuild 和 flutter_rust_bridge
        run: |
          cargo install --locked cargo-zigbuild
          cargo install flutter_rust_bridge_codegen

      - name: 配置 Flutter 平台
        run: |
          cd flutter
          flutter config --enable-linux-desktop

      - name: 生成桥接代码
        run: |
          cd flutter
          flutter pub get
          flutter_rust_bridge_codegen generate

      - name: 编译 Rust 库 (Linux ARM64)
        run: |
          cd flutter/rust
          cargo zigbuild --release --target aarch64-unknown-linux-musl

      - name: 构建 Linux ARM64
        run: |
          cd flutter
          VERSION="${{ needs.validate_version.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          flutter build linux --release --target-platform linux-arm64 --build-name="$VERSION_NUM"

      - name: 复制 so 到输出目录
        run: |
          cp flutter/rust/target/aarch64-unknown-linux-musl/release/libcfnat_flutter.so flutter/build/linux/arm64/release/bundle/lib/

      - name: 打包发布文件
        run: |
          version=${{ needs.validate_version.outputs.version }}
          versionStr=${version#v}
          mkdir -p ${{ github.workspace }}/linux
          
          cd flutter/build/linux/arm64/release/bundle
          
          tar -czf "${{ env.APP_NAME }}-linux-arm64.tar.gz" ./*
          mv *.tar.gz ${{ github.workspace }}/linux/
          
          mkdir -p deb_root/usr/local/lib/${{ env.APP_NAME }}
          mkdir -p deb_root/usr/local/bin
          cp -r ./* deb_root/usr/local/lib/${{ env.APP_NAME }}/
          ln -s /usr/local/lib/${{ env.APP_NAME }}/${{ env.APP_NAME }} deb_root/usr/local/bin/${{ env.APP_NAME }} || true
          fpm -s dir -t deb -n ${{ env.APP_NAME }} -v ${versionStr} -p ${{ github.workspace }}/linux/${{ env.APP_NAME }}-linux-arm64.deb -C deb_root usr
          
          rm -rf deb_root
          mkdir -p deb_root/usr/local/lib/${{ env.APP_NAME }}
          mkdir -p deb_root/usr/local/bin
          cp -r ./* deb_root/usr/local/lib/${{ env.APP_NAME }}/
          ln -s /usr/local/lib/${{ env.APP_NAME }}/${{ env.APP_NAME }} deb_root/usr/local/bin/${{ env.APP_NAME }} || true
          fpm -s dir -t rpm -n ${{ env.APP_NAME }} -v ${versionStr} -p ${{ github.workspace }}/linux/${{ env.APP_NAME }}-linux-arm64.rpm -C deb_root usr

      - name: 下载 AppImageTool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-aarch64.AppImage -O appimagetool
          chmod +x appimagetool

      - name: 创建 AppImage
        run: |
          mkdir -p AppDir/usr/lib/${{ env.APP_NAME }}
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          
          cp -r flutter/build/linux/arm64/release/bundle/* AppDir/usr/lib/${{ env.APP_NAME }}/
          
          ln -s ../lib/${{ env.APP_NAME }}/${{ env.APP_NAME }} AppDir/usr/bin/${{ env.APP_NAME }} || true
          
          echo "[Desktop Entry]" > AppDir/${{ env.APP_NAME }}.desktop
          echo "Name=${{ env.APP_NAME }}" >> AppDir/${{ env.APP_NAME }}.desktop
          echo "Exec=${{ env.APP_NAME }}" >> AppDir/${{ env.APP_NAME }}.desktop
          echo "Icon=${{ env.APP_NAME }}" >> AppDir/${{ env.APP_NAME }}.desktop
          echo "Type=Application" >> AppDir/${{ env.APP_NAME }}.desktop
          echo "Categories=Network;" >> AppDir/${{ env.APP_NAME }}.desktop
          
          cp AppDir/${{ env.APP_NAME }}.desktop AppDir/usr/share/applications/
          
          if [ -f "flutter/linux/flutter/ephemeral/assets/icon.png" ]; then
            cp flutter/linux/flutter/ephemeral/assets/icon.png AppDir/${{ env.APP_NAME }}.png
          else
            convert -size 256x256 xc:blue AppDir/${{ env.APP_NAME }}.png 2>/dev/null || echo "placeholder" > AppDir/${{ env.APP_NAME }}.png
          fi
          
          ARCH=aarch64 ./appimagetool AppDir ${{ github.workspace }}/linux/${{ env.APP_NAME }}-linux-arm64.AppImage

      - name: 上传 Linux 产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: linux/*

  build_macos_x64:
    name: 构建 macOS x64
    needs: [validate_version]
    if: ${{ inputs.build_macos_x64 }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: 安装 Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: 安装 LLVM
        run: |
          brew install llvm

      - name: 安装 create-dmg
        run: |
          brew install create-dmg

      - name: 安装 cargo-zigbuild 和 flutter_rust_bridge
        run: |
          cargo install --locked cargo-zigbuild
          cargo install flutter_rust_bridge_codegen

      - name: 配置 Flutter 平台
        run: |
          cd flutter
          flutter config --enable-macos-desktop

      - name: 生成桥接代码
        run: |
          cd flutter
          flutter pub get
          flutter_rust_bridge_codegen generate

      - name: 编译 Rust 库 (macOS AMD64)
        run: |
          cd flutter/rust
          cargo zigbuild --release --target x86_64-apple-darwin

      - name: 构建 macOS x64
        run: |
          cd flutter
          VERSION="${{ needs.validate_version.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          flutter build macos --release --build-name="$VERSION_NUM"

      - name: 复制 dylib 到 app
        run: |
          APP_PATH=$(find flutter/build/macos/Build/Products/Release -name "*.app" -type d | head -1)
          cp flutter/rust/target/x86_64-apple-darwin/release/libcfnat_flutter.dylib "$APP_PATH/Contents/MacOS/"

      - name: 打包 DMG
        run: |
          cd flutter/build/macos
          create-dmg --volname "${{ env.APP_NAME }}" --window-pos 200 120 --icon-size 100 --app-drop-link 600 185 --hide-secondary Build/Products/Release/*.app "${{ env.APP_NAME }}-macos-x64.dmg"

      - name: 上传 macOS 产物
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: flutter/build/macos/*.dmg

  build_macos_arm64:
    name: 构建 macOS arm64
    needs: [validate_version]
    if: ${{ inputs.build_macos_arm64 }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: 安装 Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: 安装 LLVM
        run: |
          brew install llvm

      - name: 安装 create-dmg
        run: |
          brew install create-dmg

      - name: 安装 cargo-zigbuild 和 flutter_rust_bridge
        run: |
          cargo install --locked cargo-zigbuild
          cargo install flutter_rust_bridge_codegen

      - name: 配置 Flutter 平台
        run: |
          cd flutter
          flutter config --enable-macos-desktop

      - name: 生成桥接代码
        run: |
          cd flutter
          flutter pub get
          flutter_rust_bridge_codegen generate

      - name: 编译 Rust 库 (macOS ARM64)
        run: |
          cd flutter/rust
          cargo zigbuild --release --target aarch64-apple-darwin

      - name: 构建 macOS arm64
        env:
          FLUTTER_XCODE_ARCHS: arm64
        run: |
          cd flutter
          VERSION="${{ needs.validate_version.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          flutter build macos --release --build-name="$VERSION_NUM"

      - name: 复制 dylib 到 app
        run: |
          APP_PATH=$(find flutter/build/macos/Build/Products/Release -name "*.app" -type d | head -1)
          cp flutter/rust/target/aarch64-apple-darwin/release/libcfnat_flutter.dylib "$APP_PATH/Contents/MacOS/"

      - name: 打包 DMG
        run: |
          cd flutter/build/macos
          create-dmg --volname "${{ env.APP_NAME }}" --window-pos 200 120 --icon-size 100 --app-drop-link 600 185 --hide-secondary Build/Products/Release/*.app "${{ env.APP_NAME }}-macos-arm64.dmg"

      - name: 上传 macOS 产物
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: flutter/build/macos/*.dmg

  create_release:
    name: 创建 Release
    needs: [build_android, build_windows, build_linux_x64, build_linux_arm64, build_macos_x64, build_macos_arm64, validate_version]
    if: ${{ success() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: '*'
          merge-multiple: true

      - name: 生成 Release Notes
        run: |
          VERSION="${{ needs.validate_version.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          REPO="${{ github.repository }}"
          APPNAME="${{ env.APP_NAME }}"
          
          sed -e "s/USER/$(echo $REPO | cut -d'/' -f1)/g" \
              -e "s/REPO/$(echo $REPO | cut -d'/' -f2)/g" \
              -e "s/vVERSION/$VERSION/g" \
              -e "s/VERSION/$VERSION_NUM/g" \
              -e "s/APPNAME/$APPNAME/g" \
              .github/release-notes-template.md > release-notes.md

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "${{ env.APP_NAME }} ${{ needs.validate_version.outputs.version }}"
          tag_name: ${{ needs.validate_version.outputs.version }}
          body_path: release-notes.md
          draft: false
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
